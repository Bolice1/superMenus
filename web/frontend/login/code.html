        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-gutter">
    <main class="w-full max-w-[440px] z-10">
        <div class="flex flex-col items-center mb-xl">
            <div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg">
                <span class="material-symbols-outlined text-white text-4xl" data-icon="restaurant">restaurant</span>
            </div>
            <h1 class="font-display-lg text-display-lg text-on-background tracking-tight">Super Menus</h1>
            <p class="font-body-base text-body-base text-on-surface-variant mt-xs">Hospitality Admin Portal</p>
        </div>
        <div
            class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-xl shadow-[0_12px_40px_-12px_rgba(26,28,30,0.08)]">
            <h2 class="font-headline-md text-headline-md text-on-surface mb-xl">Sign In</h2>
            <form class="space-y-lg">
                <div class="space-y-xs">
                    <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email
                        Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline"
                            data-icon="mail">mail</span>
                        <input
                            class="w-full pl-[48px] pr-md py-3 bg-surface-container-low border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-lg font-body-base text-body-base outline-none transition-all"
                            id="email" placeholder="admin@supermenus.com" type="email" />
                    </div>
                </div>
                <div class="space-y-xs">
                    <div class="flex justify-between items-center">
                        <label class="font-label-caps text-label-caps text-on-surface-variant uppercase"
                            for="password">Password</label>
                        <a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot
                            Password?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline"
                            data-icon="lock">lock</span>
                        <input
                            class="w-full pl-[48px] pr-md py-3 bg-surface-container-low border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-lg font-body-base text-body-base outline-none transition-all"
                            id="password" placeholder="••••••••" type="password" />
                    </div>
                </div>
                <button
                    class="w-full bg-primary-container text-white py-3.5 rounded-lg font-title-sm text-title-sm hover:opacity-90 active:scale-[0.98] transition-all shadow-md mt-md"
                    type="submit">
                    Sign In
                </button>
            </form>
            <div class="relative my-xl">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant/50"></div>
                </div>
                <div class="relative flex justify-center text-label-caps">
                    <span class="bg-surface-container-lowest px-4 text-on-surface-variant">OR</span>
                </div>
            </div>
            <button
                class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant hover:bg-surface-container-low rounded-lg font-body-base text-body-base text-on-surface transition-all active:scale-[0.98]"
                type="button">
                <svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                Continue with Google
            </button>
        </div>
        <div class="mt-xl text-center">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
                Need a manager account?
                <a class="text-primary font-semibold hover:underline" href="#">Request access</a>
            </p>
        </div>
    </main>
    <footer
        class="mt-auto w-full max-w-7xl mx-auto px-8 py-12 flex flex-col md:flex-row justify-between border-t border-slate-200 dark:border-slate-800">
        <div class="flex flex-col gap-2">
            <p class="font-bold text-slate-900 dark:text-white">Super Menus</p>
            <p class="text-sm text-slate-500">© 2024 Super Menus Hospitality. All rights reserved.</p>
        </div>
        <div class="flex flex-wrap gap-md mt-lg md:mt-0">
            <a class="text-sm text-slate-500 hover:text-orange-500 transition-colors" href="#">Privacy Policy</a>
            <a class="text-sm text-slate-500 hover:text-orange-500 transition-colors" href="#">Terms of Service</a>
            <a class="text-sm text-slate-500 hover:text-orange-500 transition-colors" href="#">Contact Support</a>
        </div>
    </footer>
    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-40 pointer-events-none overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[60%] rounded-full bg-orange-100 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[50%] rounded-full bg-orange-50 blur-[100px]"></div>
    </div>

        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuOMO54x2OpuquRwr6pyBxyUd9k75Lb8jN7dV2t25RVd8L3DHN5-iOTOw4Disb3TSK3gV1x5_H7pFKZB11Tz3bpeW2Qee5G4g87RgRDztdcseoBPl2fD7Rt_1-5gCiF6J80YBrH7G9IObV-uAX7BiZ_wDNkQLPoOjeCByg_EkCm_Td0X9q9YJlepGMQUhuwesBfHrGdXLoYDAyyFf0AgOlIXLd5WlYdl2Ux7S7tl9MaFxdNYqKJo9b6MWNzYyXCV8xB-q7loH3ZYgY" />
